<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Snowflake/Star Icon -->
  <g transform="translate(10, 10)">
    <!-- Center circle -->
    <circle cx="30" cy="30" r="5" fill="#5B5EF4"/>
    <!-- Arms -->
    <rect x="28" y="5" width="4" height="18" rx="2" fill="#5B5EF4"/>
    <rect x="28" y="37" width="4" height="18" rx="2" fill="#5B5EF4"/>
    <rect x="5" y="28" width="18" height="4" rx="2" fill="#5B5EF4"/>
    <rect x="37" y="28" width="18" height="4" rx="2" fill="#5B5EF4"/>
    <!-- Diagonal arms -->
    <rect x="14" y="9" width="4" height="18" rx="2" fill="#5B5EF4" transform="rotate(-45 16 18)"/>
    <rect x="14" y="33" width="4" height="18" rx="2" fill="#5B5EF4" transform="rotate(45 16 42)"/>
    <rect x="38" y="9" width="4" height="18" rx="2" fill="#5B5EF4" transform="rotate(45 40 18)"/>
    <rect x="38" y="33" width="4" height="18" rx="2" fill="#5B5EF4" transform="rotate(-45 40 42)"/>
  </g>
  <!-- GAMMA text -->
  <text x="75" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="32" fill="#5B5EF4" letter-spacing="-1">GAMMA</text>
  <!-- STACK text -->
  <text x="211" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="32" fill="#1a1a2e" letter-spacing="-1">STACK</text>
</svg>
